name: LLM Agents Flake Input Updater

on:
  schedule:
    - cron: "0 13 * * *" # runs daily at 6 am MST
  workflow_dispatch:

jobs:
  llm-agents-flake-input-updater:
    name: LLM Agents Flake Input Updater
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
      - uses: DeterminateSystems/nix-installer-action@v22
      - uses: DeterminateSystems/update-flake-lock@v28
        id: update-flake-lock
        with:
          inputs: llm-agents
          pr-title: "chore: bump llm-agents"
          pr-labels: |
            dependencies
            automated
          pr-reviewers: hyshka
      - name: Enable auto-merge
        if: steps.update-flake-lock.outputs.pull-request-number != ''
        run: gh pr merge --auto --squash ${{ steps.update-flake-lock.outputs.pull-request-number }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
